<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>♠ Pontinho Play ♠</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/mobile-game.css" />
  <link rel="stylesheet" href="css/mobile-home.css" />
  <link rel="stylesheet" href="css/mobile-tables.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>

<body>

  <!-- HOME -->
  <div id="homeScreen">
    <div class="home-shell">

      <div class="home-logo">
        <img src="/assets/image/logo-mobile.png" alt="Pontinho Play" />
      </div>

      <div class="home-menu">
        <button type="button" id="btnSettings" style="display:none;">
          <span class="btn-icon">⚙</span>
          <span class="btn-text">Configurações</span>
        </button>

        <button type="button" id="btnLogin">
          <span class="btn-icon">🔐</span>
          <span class="btn-text">Login</span>
        </button>

        <button type="button" id="btnSignup">
          <span class="btn-icon">✚</span>
          <span class="btn-text">Cadastre-se</span>
        </button>

        <button type="button" id="btnTrain" style="display:none;">
          <span class="btn-icon">👤</span>
          <span class="btn-text">Perfil</span>
        </button>

        <button type="button" id="btnClassic" class="primary" style="display:none;">
          <span class="btn-icon">♠</span>
          <span class="btn-text">Jogar Pontinho Clássico</span>
        </button>

        <button type="button" id="btnCrazy" class="primary" style="display:none;">
          <span class="btn-icon">♣</span>
          <span class="btn-text">Jogar Pontinho Crazy</span>
        </button>

        <button type="button" id="btnLogout" style="display:none;">
          <span class="btn-icon">↪</span>
          <span class="btn-text">Sair</span>
        </button>
      </div>

      <div class="home-status-wrap">
        <div class="home-usercard" id="homeUserCard">
          <div class="home-usercard-row">
            <img id="homeUserAvatar" class="home-user-avatar" src="/assets/avatars/avatar-01.png" alt="Avatar" />
            <div class="home-user-meta">
              <div id="homeUserName">Visitante</div>
              <div id="homeUserBalance">Saldo: —</div>
            </div>
          </div>
        </div>

        <div class="home-status">
          <div class="panel-title">Status Online</div>
          <div class="panel-row"><span>Jogadores online</span><strong id="onlinePlayers">—</strong></div>
          <div class="panel-row"><span>Mesas abertas</span><strong id="openTables">—</strong></div>
        
        </div>
      </div>

    </div>

    <div class="home-banner">
  <div class="home-banner-text">
    <div class="home-banner-title">♣ CRIE SUA CONTA GRÁTIS! ♠</div>
    <div class="home-banner-sub">♥ JOGUE ONLINE COM SEUS AMIGOS E DIVIRTA-SE! ♦</div>
  </div>

  <img class="home-banner-cards" src="/assets/image/banner-cartas.png" alt="Cartas" />
</div>

<!-- MESAS AO VIVO -->
<div class="home-live-section">
  <div class="home-section-title">🔥 Mesas ao vivo</div>
  <div id="homeLiveTables" class="home-live-row home-live-row-visual"></div>
</div>

    
  
    <div class="home-footer">
  ♦ ♣ Pontinho Play ♠ ♥
</div>
  </div>

  

  <!-- TELA DE MESAS -->
  <div id="tablesScreen" style="display:none;">
    <div class="tables-header">
      <div class="tables-title">
        ♦ ♣ Pontinho Play ♠ ♥
      </div>

      <div id="tablesVariantSwitch"></div>
    </div>

    <div id="tablesGrid"></div>

    <button id="startGame" style="display:none;">Iniciar jogo</button>
  </div>

  <!-- JOGO -->
  <div id="game" style="display:none;">
    <div id="playerInfo"></div>

    <div id="table"></div>

    <div id="deck-area">
      <div id="monte" class="pile-slot"></div>
      <div id="lixo" class="pile-slot"></div>
    </div>

    <div id="bottomArea">
      <div id="hand"></div>
      <div id="scoreboard"></div>

      <button
        type="button"
        class="sort-btn"
        title="Ordenar por valor"
        onclick="window.setHandSort('value')"
      >
        <img src="./assets/image/sort-value.png" alt="Ordenar por Valor" />
      </button>

      <button
        type="button"
        class="sort-btn"
        title="Ordenar por naipe"
        onclick="window.setHandSort('suit')"
      >
        <img src="./assets/image/sort-suit.png" alt="Ordenar por Naipe" />
      </button>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
