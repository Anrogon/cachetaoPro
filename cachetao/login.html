<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cachetão Pro - Login</title>
  <style>
body{
  margin:0;
  min-height:100vh;

  display:grid;
  place-items:center;

  padding:20px;
  box-sizing:border-box;

  background:
    linear-gradient(rgba(0,70,35,.72), rgba(0,35,18,.88)),
    url("./assets/image/bg-g.png") center/cover fixed no-repeat;

  font-family:Arial, Helvetica, sans-serif;
  color:#fff;
}

.auth-card{

  width:min(420px,92vw);

  padding:30px 26px;

  border-radius:22px;

  background:linear-gradient(180deg,#06391f,#032514);

  border:1px solid rgba(212,175,55,.38);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 16px 36px rgba(0,0,0,.35);
}

.auth-card h1{

  margin:0 0 8px;

  text-align:center;

  color:#ffd86b;

  font-size:34px;
  font-weight:900;

  text-shadow:0 3px 8px rgba(0,0,0,.45);
}

.login-subtitle{

  margin:0 0 24px;

  text-align:center;

  color:rgba(255,255,255,.88);

  font-size:15px;
}

.auth-card input{

  width:100%;
  box-sizing:border-box;

  margin-bottom:14px;

  padding:13px 14px;

  border-radius:14px;

  border:1px solid rgba(212,175,55,.22);

  background:rgba(255,255,255,.08);

  color:#fff;

  font-size:15px;

  transition:.15s;
}

.auth-card input:focus{

  outline:none;

  border-color:#d4af37;

  background:rgba(255,255,255,.12);

  box-shadow:0 0 0 3px rgba(212,175,55,.18);
}

.auth-card input::placeholder{

  color:rgba(255,255,255,.65);
}

.auth-actions{

  display:grid;

  gap:12px;

  margin-top:8px;
}

button{

  padding:13px 14px;

  border-radius:14px;

  font-size:16px;

  font-weight:900;

  cursor:pointer;

  transition:
    transform .10s ease,
    filter .10s ease;
}

.primary{

  background:linear-gradient(180deg,#a51f36,#731726);

  color:#fff;

  border:1px solid rgba(212,175,55,.30);

  box-shadow:0 8px 18px rgba(0,0,0,.24);
}

.primary:hover{

  background:linear-gradient(180deg,#bd2941,#8b1d2f);

  transform:translateY(-1px);
}

.primary:active{

  transform:scale(.97);

  filter:brightness(.9);
}

.secondary{

  background:rgba(255,255,255,.10);

  color:#fff;

  border:1px solid rgba(255,255,255,.18);
}

.secondary:hover{

  background:rgba(255,255,255,.16);
}

.secondary:active{

  transform:scale(.97);
}

.auth-message{

  min-height:22px;

  margin-top:14px;

  text-align:center;

  color:#ffd86b;

  font-weight:800;
}

.auth-links{

  margin-top:18px;

  text-align:center;

  font-size:14px;

  color:rgba(255,255,255,.82);

  line-height:1.6;
}

.auth-links a{

  color:#ffd86b;

  font-weight:900;

  text-decoration:none;
}

.auth-links a:hover{

  text-decoration:underline;
}

@media(max-width:600px){

  .auth-card{
    padding:26px 20px;
  }

  .auth-card h1{
    font-size:30px;
  }

}
</style>
</head>
<body>
  <div class="auth-card">
    <h1> ♠ Login  ♠</h1>
    
    <div class="login-subtitle">
    Entre na sua conta para continuar jogando.
    </div>

    <input type="email" id="loginEmail" placeholder="Seu e-mail">
    <input type="password" id="loginPassword" placeholder="Sua senha">

    <div class="auth-actions">
      <button id="btnLoginSubmit" class="primary" type="button">Entrar</button>
      <button id="btnBackHome" class="secondary" type="button">Voltar</button>
    </div>

    <div id="authMessage" class="auth-message"></div>

    <div class="auth-links" style="margin-top:10px;">
    Problemas para acessar? Fale com a administração.
    </div>

    <div class="auth-links">
      Não tem conta?
      <a href="./signup.html">Cadastre-se</a>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
