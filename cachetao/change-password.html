<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cachetão Pro - Trocar Senha</title>
  <style>
body{
  margin:0;
  min-height:100vh;

  display:grid;
  place-items:center;

  padding:20px;
  box-sizing:border-box;

  background:
    linear-gradient(rgba(0,70,35,.72), rgba(0,35,18,.88)),
    url("./assets/image/bg-g.png") center/cover fixed no-repeat;

  font-family:Arial, Helvetica, sans-serif;
  color:#fff;
}

.card{
  width:min(430px,92vw);
  padding:30px 26px;

  border-radius:22px;
  background:linear-gradient(180deg,#06391f,#032514);
  border:1px solid rgba(212,175,55,.38);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 16px 36px rgba(0,0,0,.35);
}

h1{
  margin:0 0 10px;

  text-align:center;

  color:#ffd86b;
  font-size:30px;
  font-weight:900;

  text-shadow:0 3px 8px rgba(0,0,0,.45);
}

.sub{
  margin:0 0 22px;

  padding:14px 16px;

  border-radius:16px;
  background:rgba(212,175,55,.10);
  border:1px solid rgba(212,175,55,.22);

  text-align:center;
  font-size:14px;
  line-height:1.55;
  font-weight:800;
  color:#fff;
}

input{
  width:100%;
  box-sizing:border-box;

  margin-bottom:14px;
  padding:13px 14px;

  border-radius:14px;
  border:1px solid rgba(212,175,55,.22);

  background:rgba(255,255,255,.08);

  color:#fff;
  font-size:15px;

  transition:.15s;
}

input:focus{
  outline:none;
  border-color:#d4af37;
  background:rgba(255,255,255,.12);
  box-shadow:0 0 0 3px rgba(212,175,55,.18);
}

input::placeholder{
  color:rgba(255,255,255,.65);
}

.actions{
  display:grid;
  gap:12px;
  margin-top:10px;
}

button{
  padding:13px 14px;

  border-radius:14px;

  font-size:15px;
  font-weight:900;

  cursor:pointer;

  transition:
    transform .10s ease,
    filter .10s ease,
    background .10s ease;
}

.primary{
  background:linear-gradient(180deg,#a51f36,#731726);
  color:#fff;
  border:1px solid rgba(212,175,55,.30);
  box-shadow:0 8px 18px rgba(0,0,0,.24);
}

.primary:hover{
  background:linear-gradient(180deg,#bd2941,#8b1d2f);
  transform:translateY(-1px);
}

.primary:active{
  transform:scale(.97);
  filter:brightness(.9);
}

.secondary{
  background:rgba(255,255,255,.10);
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
}

.secondary:hover{
  background:rgba(255,255,255,.16);
}

.secondary:active{
  transform:scale(.97);
}

.msg{
  min-height:22px;
  margin-top:14px;

  text-align:center;
  font-size:14px;
  font-weight:800;

  color:#ffd86b;
}

@media(max-width:600px){
  .card{
    padding:26px 20px;
  }

  h1{
    font-size:27px;
  }
}
</style>
</head>
<body>
  <div class="card">
    <h1>Troca obrigatória de senha</h1>
    <p class="sub">
      Sua senha foi redefinida pela administração. Antes de continuar, você precisa cadastrar uma nova senha.
    </p>

    <input type="password" id="newPassword" placeholder="Nova senha">
    <input type="password" id="confirmPassword" placeholder="Confirmar nova senha">

    <div class="actions">
      <button id="btnChangePassword" class="primary" type="button">Salvar nova senha</button>
      <button id="btnBackLogin" class="secondary" type="button">Voltar ao login</button>
    </div>

    <div id="changePasswordMsg" class="msg"></div>
  </div>

  <script src="./js/change-password.js"></script>
</body>
</html>
