<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Cachetão Pro</title>

<link rel="stylesheet" href="./css/reset.css">
<link rel="stylesheet" href="./css/layout.css">

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px 18px;
    box-sizing:border-box;

    color:#fff;
}

.auth-card{

    width:min(440px,94vw);

    padding:34px 28px;

    border-radius:22px;

    background:
        linear-gradient(180deg,#06391f,#032514);

    border:1px solid rgba(212,175,55,.38);

    box-shadow:
        inset 0 1px rgba(255,255,255,.08),
        0 16px 36px rgba(0,0,0,.35);
}

.auth-card h1{

    margin:0 0 6px;

    text-align:center;

    font-size:34px;
    font-weight:900;

    color:#ffd86b;

    text-shadow:0 3px 8px rgba(0,0,0,.45);
}

.auth-subtitle{

    margin-bottom:24px;

    text-align:center;

    color:#fff;

    opacity:.88;

    font-size:15px;
}

.auth-card input{

    width:100%;

    box-sizing:border-box;

    margin-bottom:14px;

    padding:13px 14px;

    border-radius:14px;

    border:1px solid rgba(212,175,55,.22);

    background:rgba(255,255,255,.08);

    color:#fff;

    font-size:15px;

    transition:.15s;
}

.auth-card input:focus{

    outline:none;

    border-color:#d4af37;

    background:rgba(255,255,255,.12);

    box-shadow:0 0 0 3px rgba(212,175,55,.18);
}

.auth-card input::placeholder{

    color:rgba(255,255,255,.65);
}

.terms-accept{

    margin:8px 0 20px;

    padding:14px;

    border-radius:16px;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(212,175,55,.18);

    font-size:14px;

    line-height:1.5;
}

.terms-accept label{

    display:flex;
    align-items:flex-start;
    gap:10px;
}

.terms-accept input{

    width:auto;
    margin:3px 0 0;
}

.terms-accept a{

    color:#ffd86b;
    text-decoration:none;
    font-weight:900;
}

.terms-accept a:hover{

    text-decoration:underline;
}

.auth-actions{

    display:grid;

    gap:12px;
}

button{

    padding:13px;

    border-radius:14px;

    font-size:16px;

    font-weight:900;

    cursor:pointer;

    transition:.12s;
}

.primary{

    background:
      linear-gradient(180deg,#a51f36,#731726);

    color:#fff;

    border:1px solid rgba(212,175,55,.30);

    box-shadow:0 8px 18px rgba(0,0,0,.22);
}

.primary:hover{

    background:
      linear-gradient(180deg,#bc2942,#8d1d31);

    transform:translateY(-1px);
}

.primary:active{

    transform:scale(.98);
}

.secondary{

    background:rgba(255,255,255,.10);

    border:1px solid rgba(255,255,255,.16);

    color:#fff;
}

.secondary:hover{

    background:rgba(255,255,255,.16);
}

.auth-message{

    min-height:22px;

    margin-top:16px;

    text-align:center;

    color:#ffd86b;

    font-weight:700;
}

.auth-links{

    margin-top:20px;

    text-align:center;

    font-size:15px;
}

.auth-links a{

    color:#ffd86b;

    font-weight:900;

    text-decoration:none;
}

.auth-links a:hover{

    text-decoration:underline;
}

@media(max-width:600px){

.auth-card{

    padding:28px 20px;
}

.auth-card h1{

    font-size:30px;
}

}


.signup-info{

  margin:-6px 0 18px;

  text-align:center;

  font-size:13px;
  line-height:1.45;

  color:rgba(255,255,255,.78);

}

</style>

</head>

<body>

<div class="auth-card">

<h1>♠ Cadastre-se ♠</h1>

<div class="auth-subtitle">
Crie sua conta e entre nas mesas do Cachetão Pro.
</div>

<input type="text"
id="signupUsername"
placeholder="Nome de usuário">

<input type="email"
id="signupEmail"
placeholder="E-mail">

<input type="password"
id="signupPassword"
placeholder="Senha">

<div class="terms-accept">

<label>

<input
type="checkbox"
id="acceptTerms">

<span>

Li e aceito os
<a href="./terms.html" target="_blank">
Termos de Uso
</a>

e a

<a href="./privacy.html" target="_blank">
Política de Privacidade
</a>.

</span>

</label>

</div>

<div class="signup-info">
  🎮 Seu avatar poderá ser escolhido posteriormente na página <strong>Perfil</strong>.
</div>
<div class="auth-actions">

<button
id="btnSignupSubmit"
class="primary"
type="button">

Criar conta

</button>

<button
id="btnBackLogin"
class="secondary"
type="button">

Voltar

</button>

</div>

<div
id="authMessage"
class="auth-message">

</div>

<div class="auth-links">

Já possui uma conta?

<br><br>

<a href="./login.html">

Entrar

</a>

</div>

</div>

<script src="../js/signup.js"></script>

</body>
</html>
